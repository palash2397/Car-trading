name: Car-trading CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env file safely
        run: |
          rm -f .env
          printf "%s" "${{ secrets.PROD_ENV_FILE }}" > .env
          chmod 600 .env

      - name: run car backend
        run: npm run build

      - name: Run backend
        run: |
             export HOME=/home/runneruser
             export PM2_HOME=/home/runneruser/.pm2
             cd /var/www/car-trading/actions-runner/_work/Car-trading/Car-trading
             chmod 644 .env
             npm install
             npm run build || true
             /usr/bin/pm2 delete car-backend || true
             /usr/bin/pm2 start dist/main.js --name car-backend
             /usr/bin/pm2 save
